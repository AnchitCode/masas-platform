name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Lint Backend ────────────────────────────────────────

  lint-server:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
        working-directory: server

      - run: npm run lint
        working-directory: server

  # ─── Lint Frontend ───────────────────────────────────────

  lint-client:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
        working-directory: client

      - run: npm run lint
        working-directory: client

  # ─── Test Backend ────────────────────────────────────────

  test-server:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-server

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: masas_test
          POSTGRES_PASSWORD: masas_test_password
          POSTGRES_DB: masas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U masas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://masas_test:masas_test_password@localhost:5432/masas_test
      JWT_ACCESS_SECRET: ci-test-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters-long
      NODE_ENV: test
      RATE_LIMIT_MAX: 10000
      DATABASE_BRANCH: masas-test
      ALLOW_TEST_DB_RESET: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
        working-directory: server

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: server

      - name: Run Migrations
        run: npx prisma migrate deploy
        working-directory: server

      - name: Run Tests with Coverage
        run: npm run test:coverage
        working-directory: server

  # ─── Build Frontend ──────────────────────────────────────

  build-client:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
        working-directory: client

      - run: npm run build
        working-directory: client
